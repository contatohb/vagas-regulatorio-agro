name: Daily Vagas Regulatorio Agro Alert

on:
  schedule:
    - cron: '0 11 * * *'  # 08:00 BRT (11:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  vagas-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 python-dotenv

      - name: Send daily vagas alert
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: cd scripts && python alerta_vagas_regulatorio.py
        env:
          MONITOR_RECIPIENT: ${{ secrets.MONITOR_RECIPIENT }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Commit updated seen history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vagas_seen.json || true
          git diff --cached --quiet || git commit -m "chore: update vagas seen history [skip ci]"
          git pull --rebase origin main || true
          git push || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "Vagas alert job failed at $(date)"
          exit 1
